<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D3 인물관계 네트워크</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #f7f8fa;
      color: #222;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .desc {
      margin: 0 0 16px;
      color: #555;
      line-height: 1.6;
    }

    .legend {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 16px;
      font-size: 14px;
      color: #444;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-line {
      width: 28px;
      height: 0;
      border-top: 3px solid #999;
    }

    .legend-line.parent-child {
      border-color: #d62828;
    }

    .legend-line.friend {
      border-color: #4a90e2;
    }

    #network {
      width: 100%;
      height: 680px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .link-label {
      font-size: 13px;
      fill: #444;
      pointer-events: none;
      user-select: none;
    }

    .node-circle {
      stroke: #fff;
      stroke-width: 2px;
      cursor: grab;
    }

    .node-circle:active {
      cursor: grabbing;
    }

    .node-text {
      font-size: 14px;
      font-weight: 600;
      fill: #222;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>인물관계 네트워크 다이어그램</h1>
    <p class="desc">
      부모-자식 관계는 빨간색, 친구 관계는 파란색으로 표시합니다.
    </p>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-line parent-child"></span>
        <span>부모-자식</span>
      </div>
      <div class="legend-item">
        <span class="legend-line friend"></span>
        <span>친구</span>
      </div>
    </div>

    <div id="network"></div>
  </div>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const data = {
      nodes: [
        { name: "홍대감" },
        { name: "홍길동" },
        { name: "사임당" },
        { name: "율곡" }
      ],
      links: [
        { source: "홍대감", target: "홍길동", relation: "아들" },
        { source: "사임당", target: "율곡", relation: "아들" },
        { source: "홍길동", target: "율곡", relation: "친구" }
      ]
    };

    const container = document.getElementById("network");
    const width = container.clientWidth;
    const height = container.clientHeight;

    const relationColor = (relation) => {
      if (relation === "아들" || relation === "딸" || relation === "부모" || relation === "자식") {
        return "#d62828"; // 부모-자식 관계: 빨간색
      }
      return "#4a90e2";   // 그 외 관계: 파란색
    };

    const svg = d3
      .select("#network")
      .append("svg")
      .attr("width", width)
      .attr("height", height)
      .attr("viewBox", `0 0 ${width} ${height}`);

    const defs = svg.append("defs");

    // 화살표 마커 정의
    defs.append("marker")
      .attr("id", "arrow-red")
      .attr("viewBox", "0 -5 10 10")
      .attr("refX", 22)
      .attr("refY", 0)
      .attr("markerWidth", 8)
      .attr("markerHeight", 8)
      .attr("orient", "auto")
      .append("path")
      .attr("d", "M0,-5L10,0L0,5")
      .attr("fill", "#d62828");

    defs.append("marker")
      .attr("id", "arrow-blue")
      .attr("viewBox", "0 -5 10 10")
      .attr("refX", 22)
      .attr("refY", 0)
      .attr("markerWidth", 8)
      .attr("markerHeight", 8)
      .attr("orient", "auto")
      .append("path")
      .attr("d", "M0,-5L10,0L0,5")
      .attr("fill", "#4a90e2");

    const g = svg.append("g");

    // 확대/이동
    svg.call(
      d3.zoom()
        .scaleExtent([0.5, 2.5])
        .on("zoom", (event) => {
          g.attr("transform", event.transform);
        })
    );

    const simulation = d3.forceSimulation(data.nodes)
      .force(
        "link",
        d3.forceLink(data.links)
          .id(d => d.name)
          .distance(link => link.relation === "친구" ? 180 : 140)
          .strength(0.9)
      )
      .force("charge", d3.forceManyBody().strength(-700))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide().radius(42));

    const link = g.append("g")
      .selectAll("line")
      .data(data.links)
      .join("line")
      .attr("stroke", d => relationColor(d.relation))
      .attr("stroke-width", 3)
      .attr("stroke-opacity", 0.9)
      .attr("marker-end", d =>
        relationColor(d.relation) === "#d62828" ? "url(#arrow-red)" : "url(#arrow-blue)"
      );

    const linkLabel = g.append("g")
      .selectAll("text")
      .data(data.links)
      .join("text")
      .attr("class", "link-label")
      .attr("text-anchor", "middle")
      .text(d => d.relation);

    const node = g.append("g")
      .selectAll("g")
      .data(data.nodes)
      .join("g")
      .call(
        d3.drag()
          .on("start", dragStarted)
          .on("drag", dragged)
          .on("end", dragEnded)
      );

    node.append("circle")
      .attr("class", "node-circle")
      .attr("r", 28)
      .attr("fill", "#2a9d8f");

    node.append("text")
      .attr("class", "node-text")
      .attr("dy", 5)
      .attr("text-anchor", "middle")
      .text(d => d.name);

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      linkLabel
        .attr("x", d => (d.source.x + d.target.x) / 2)
        .attr("y", d => (d.source.y + d.target.y) / 2 - 8);

      node.attr("transform", d => `translate(${d.x}, ${d.y})`);
    });

    function dragStarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    // 창 크기 변경 대응
    window.addEventListener("resize", () => {
      const newWidth = container.clientWidth;
      const newHeight = container.clientHeight;

      svg
        .attr("width", newWidth)
        .attr("height", newHeight)
        .attr("viewBox", `0 0 ${newWidth} ${newHeight}`);

      simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
      simulation.alpha(0.5).restart();
    });
  </script>
</body>
</html>
